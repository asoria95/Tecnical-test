spring.application.name=account

# Customer-service base URL for synchronous HTTP integration (e.g. GET /clientes/{id})
customer.service.base-url=http://localhost:8081

# Default profile: PostgreSQL (Docker). Use profile 'test' for H2 in tests.
spring.datasource.url=jdbc:postgresql://localhost:5433/accountdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=account
spring.datasource.password=account

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
